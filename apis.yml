apis:
  - aid: defense-technical-information-center:defense-technical-information-center-website
    name: DTIC Website
    description: >-
      Public-facing website of the Defense Technical Information Center
      describing DTIC services, products, and access programs. The site
      links to Discover, R&E Gateway, training, and registration but does
      not publish a developer API.
    humanURL: https://www.dtic.mil
    tags:
      - Federal Government
      - Website
    properties:
      - type: Documentation
        url: https://www.dtic.mil
  - aid: defense-technical-information-center:defense-technical-information-center-discover
    name: DTIC Discover
    description: >-
      Search platform for DTIC's collection of technical reports and other
      scientific and technical information assets. Discover offers
      faceted search, citation export, and document download for
      authorized users. Programmatic access is not publicly documented.
    humanURL: https://discover.dtic.mil
    tags:
      - Discovery
      - Search
      - Technical Reports
    properties:
      - type: Documentation
        url: https://discover.dtic.mil
  - aid: defense-technical-information-center:defense-technical-information-center-re-gateway
    name: DTIC Research and Engineering (R&E) Gateway
    description: >-
      Authenticated portal for DoD researchers and registered users to
      access DTIC research and engineering resources, planning documents,
      and program information.
    humanURL: https://discover.dtic.mil
    tags:
      - Engineering
      - R&E
      - Research
    properties:
      - type: Documentation
        url: https://discover.dtic.mil
  - aid: defense-technical-information-center:defense-technical-information-center-dodtechspace
    name: DoDTechSpace
    description: >-
      Collaboration platform for DoD scientists, engineers, and program
      managers operated by DTIC for sharing knowledge, communities of
      practice, and project information.
    humanURL: https://www.dodtechspace.mil
    tags:
      - Collaboration
      - Communities of Practice
    properties:
      - type: Documentation
        url: https://www.dodtechspace.mil
  - aid: defense-technical-information-center:defense-technical-information-center-foia
    name: DTIC FOIA Reading Room
    description: >-
      Online portal that publishes records released under the Freedom of
      Information Act. Records are browsable and downloadable but there is
      no documented API.
    humanURL: https://www.dtic.mil/foia
    tags:
      - FOIA
      - Open Records
      - Transparency
    properties:
      - type: Documentation
        url: https://www.dtic.mil/foia
