aid: defense-technical-information-center
name: Defense Technical Information Center
description: >-
  The Defense Technical Information Center (DTIC) is the U.S. Department of
  Defense field activity that acquires, manages, and disseminates scientific
  and technical information from DoD-funded research, development, test, and
  evaluation. DTIC operates a public Research and Engineering (R&E)
  Gateway, the Discover service for searching technical reports, the
  DoDTechSpace and Minsky natural-language platforms for defense researchers,
  and Dimensions for collaborative discovery. Most DTIC services require
  authentication tied to DoD or registered-user roles. DTIC does not
  publicly publish a developer API, though tools such as Dimensions and
  Minsky offer programmatic capabilities to authorized users.
